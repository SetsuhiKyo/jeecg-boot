name: Jeecg-Boot-CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v3

      - name: 2. 安装 Java 环境
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3. 使用 Maven 打包
        run: mvn clean package -DskipTests -Pprod

      # ✅ 4. 上传 jar（路径改了）
      - name: 4. 上传 jar 到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}   # ⚠️ 改成 deploy
          key: ${{ secrets.SERVER_SSH_KEY }}  # ⚠️ 建议用 key，不用密码
          source: "jeecg-module-system/jeecg-system-start/target/jeecg-system-start-3.7.3.jar"
          target: "/var/www/yy_car/"
          strip_components: 1

      # ✅ 5. 重命名 + 重启服务（替代 restart.sh）
      - name: 5. 重启服务
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mv /var/www/yy_car/jeecg-system-start/target/jeecg-system-start-3.7.3.jar /var/www/yy_car/app.jar
            sudo systemctl restart yy_car
            sudo systemctl status yy_car