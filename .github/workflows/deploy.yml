name: Jeecg-Boot-CI-CD

on:
  push:
    branches: [ "main" ] # 只有当你推送到 main 分支时才触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 在 GitHub 提供的虚拟 Ubuntu 上运行

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v3

      - name: 2. 安装 Java 环境
        uses: actions/setup-java@v3
        with:
          java-version: '17' # 如果你是 JDK 11 或 17 请修改这里
          distribution: 'temurin'
          cache: maven

      - name: 3. 使用 Maven 打包
        run: mvn clean package -DskipTests -Pprod

      - name: 4. 发送文件到 Vultr
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          # 这里的 source 要对应你 target 目录下的文件名
          source: "target/jeecg-system-start-3.7.3.jar"
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 1 # 去掉 target 目录前缀，只传 jar 包

      - name: 5. 远程执行重启脚本
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            chmod +x restart.sh
            ./restart.sh